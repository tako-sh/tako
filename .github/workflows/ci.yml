name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      website_only: ${{ steps.filter.outputs.website_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "website_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            echo "website_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "website_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$base" "${{ github.sha }}" > changed-files.txt
          if [ -s changed-files.txt ] && ! grep -Ev '^(website/|$)' changed-files.txt >/dev/null; then
            echo "website_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "website_only=false" >> "$GITHUB_OUTPUT"
          fi

  rust:
    name: Rust
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips-dev libheif-plugin-aomenc

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace --locked --lib --bins

      - name: Check Rust SDK package
        run: cargo publish -p tako --dry-run --locked

      - name: Run perf smoke tests
        run: cargo test -p tako-server --locked perf_smoke_

  go:
    name: Go SDK
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"

      - name: Format check
        run: |
          test -z "$(gofmt -l . examples/go/)" || {
            echo "Go files not formatted. Run: gofmt -w . examples/go/"
            gofmt -l . examples/go/
            exit 1
          }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build examples
        run: |
          for dir in examples/go/*/; do
            echo "Building $dir..."
            (cd "$dir" && go build -o /dev/null .)
          done

  bun:
    name: Bun
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        run: bash scripts/install-bun.sh "${{ env.BUN_VERSION }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SDK build
        run: bun run --filter 'tako.sh' build

      - name: Typecheck
        run: bun run --filter 'tako.sh' typecheck

      - name: Test
        run: bun test --cwd sdk/javascript

  cli-linux:
    name: CLI Tests (Linux)
    needs: [build-x86_64-glibc]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download CLI binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin

      - name: Make binaries executable
        run: chmod +x .e2e-bin/tako .e2e-bin/tako-dev-server .e2e-bin/tako-dev-proxy

      - name: Install libvips runtime
        run: sh scripts/install-libvips-runtime.sh

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Setup Bun
        run: bash scripts/install-bun.sh "${{ env.BUN_VERSION }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --filter 'tako.sh' build

      - name: Add E2E bin to PATH
        run: echo "${{ github.workspace }}/.e2e-bin" >> "$GITHUB_PATH"

      - name: Run CLI tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
        run: cd e2e/cli && bun test

      - name: Run dev E2E tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
          TAKO_DEV_E2E: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd e2e/cli && sudo -E env "PATH=$PATH" bun test tests/dev.test.ts

  cli-macos:
    name: CLI Tests (macOS)
    needs: [build-darwin]
    if: github.event_name == 'push'
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download CLI binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bin-tako-darwin-aarch64
          path: .e2e-bin

      - name: Make binaries executable
        run: chmod +x .e2e-bin/tako .e2e-bin/tako-dev-server .e2e-bin/tako-dev-proxy

      - name: Install libvips
        run: sh scripts/install-libvips-runtime.sh

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Setup Bun
        run: bash scripts/install-bun.sh "${{ env.BUN_VERSION }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --filter 'tako.sh' build

      - name: Add E2E bin to PATH
        run: echo "${{ github.workspace }}/.e2e-bin" >> "$GITHUB_PATH"

      - name: Run CLI tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
        run: cd e2e/cli && bun test

      - name: Run dev E2E tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
          TAKO_DEV_E2E: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd e2e/cli && sudo -E env "PATH=$PATH" bun test tests/dev.test.ts

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check website changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "website=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -n "$base" ] && ! [[ "$base" =~ ^0+$ ]] && git cat-file -e "$base^{commit}" 2>/dev/null && git diff --name-only "$base" "${{ github.sha }}" | grep -E '^website/' >/dev/null; then
            echo "website=true" >> "$GITHUB_OUTPUT"
          else
            echo "website=false" >> "$GITHUB_OUTPUT"
          fi

      # Astro requires Node >= 22.12.0; runner default is too old
      - name: Setup Node
        if: steps.changes.outputs.website == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Setup Bun
        if: steps.changes.outputs.website == 'true'
        run: bash scripts/install-bun.sh "${{ env.BUN_VERSION }}"

      - name: Install dependencies
        if: steps.changes.outputs.website == 'true'
        run: bun install --frozen-lockfile

      - name: Install D2
        if: steps.changes.outputs.website == 'true'
        env:
          D2_VERSION: v0.7.1
        run: |
          curl -fsSLO "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz"
          tar -xzf "d2-${D2_VERSION}-linux-amd64.tar.gz"
          sudo make -sC "d2-${D2_VERSION}" install

      - name: Typecheck website
        if: steps.changes.outputs.website == 'true'
        run: bun run --filter website check

      - name: Build website
        if: steps.changes.outputs.website == 'true'
        run: bun run --filter website build --silent

      - name: Check links
        if: steps.changes.outputs.website == 'true'
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: --offline --root-dir website/dist 'website/dist/**/*.html'

  # x86_64 glibc — needed for CLI tests + E2E
  build-x86_64-glibc:
    name: Build x86_64 (glibc)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    # Build inside Debian 11 container for glibc 2.31 compat (supports Debian 11+, Ubuntu 22.04+, RHEL 9+, Amazon Linux 2023)
    container: rust:1.97-bullseye@sha256:33e0cd779c556a248ac05acabb695c1da0cffaccc1796da507451482ac94d277
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev libvips-dev

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako-cli --bin tako --bin tako-dev-server --bin tako-dev-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-linux-x86_64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-dev-proxy
          if-no-files-found: error

  # x86_64 musl — needed for E2E (Alpine)
  build-x86_64-musl:
    name: Build x86_64 (musl)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build
        run: |
          docker run --rm \
            -e TAKO_BUILD_SHA="${{ github.sha }}" \
            -v "$PWD":/workspace \
            -w /workspace \
            rust:1.95-alpine \
            sh -c 'apk add --no-cache build-base cmake perl pkgconfig vips-dev && PATH="/usr/local/cargo/bin:$PATH" RUSTFLAGS="-C target-feature=-crt-static" cargo build -p tako-server --release'

      - name: Upload server binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: target/release/tako-server
          if-no-files-found: error

  # aarch64 glibc — master only (for rolling release)
  build-aarch64-glibc:
    name: Build aarch64 (glibc)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    # Build inside Debian 11 container for glibc 2.31 compat (same as x86_64)
    container: rust:1.97-bullseye@sha256:33e0cd779c556a248ac05acabb695c1da0cffaccc1796da507451482ac94d277
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev libvips-dev

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako-cli --bin tako --bin tako-dev-server --bin tako-dev-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-server-linux-aarch64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-linux-aarch64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-dev-proxy
          if-no-files-found: error

  # aarch64 musl — master only (for rolling release)
  build-aarch64-musl:
    name: Build aarch64 (musl)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build
        run: |
          docker run --rm \
            -e TAKO_BUILD_SHA="${{ github.sha }}" \
            -v "$PWD":/workspace \
            -w /workspace \
            rust:1.95-alpine \
            sh -c 'apk add --no-cache build-base cmake perl pkgconfig vips-dev && PATH="/usr/local/cargo/bin:$PATH" RUSTFLAGS="-C target-feature=-crt-static" cargo build -p tako-server --release'

      - name: Upload server binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-server-linux-aarch64-musl
          path: target/release/tako-server
          if-no-files-found: error

  # macOS builds — master only (for rolling release)
  build-darwin:
    name: Build macOS CLI (aarch64)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-apple-darwin
          rustup default stable

      - name: Install libvips
        run: sh scripts/install-libvips-runtime.sh

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-cli --bin tako --bin tako-dev-server --bin tako-dev-proxy --release --target aarch64-apple-darwin
          sh scripts/package-tako-app.sh \
            target/aarch64-apple-darwin/release/tako \
            target/aarch64-apple-darwin/release/Tako.app

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-tako-darwin-aarch64
          path: |
            target/aarch64-apple-darwin/release/tako
            target/aarch64-apple-darwin/release/tako-dev-server
            target/aarch64-apple-darwin/release/tako-dev-proxy
            target/aarch64-apple-darwin/release/Tako.app
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [build-x86_64-glibc, build-x86_64-musl]
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download CLI + server (glibc)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin/glibc

      - name: Download server (glibc)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: .e2e-bin/glibc

      - name: Download server (musl)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: .e2e-bin/musl

      - name: Make binaries executable
        run: chmod +x .e2e-bin/glibc/* .e2e-bin/musl/*

      - name: Write E2E build stamp
        run: |
          set -euo pipefail
          arch=$(uname -m)
          head=$(git rev-parse HEAD)
          dirty_suffix=""
          if ! git diff --quiet --ignore-submodules HEAD --; then
            dirty_suffix="-dirty"
          fi
          printf '%s-%s%s\n' "$head" "$arch" "$dirty_suffix" > .e2e-bin/.build-stamp

      - name: Install libvips runtime
        run: sh scripts/install-libvips-runtime.sh

      - name: Run E2E suites
        env:
          E2E_BIN_DIR: ${{ github.workspace }}/.e2e-bin
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for fixture in $(find e2e/fixtures -mindepth 2 -maxdepth 2 -type d | sort); do
            ./e2e/run.sh "$fixture"
          done
          ./e2e/run.sh examples/go/basic
