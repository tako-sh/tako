name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      website_only: ${{ steps.filter.outputs.code == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**'
              - '!website/**'

  rust:
    name: Rust
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace --locked --lib --bins

      - name: Run perf smoke tests
        run: cargo test -p tako-server --locked perf_smoke_

  go:
    name: Go SDK
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Go SDK changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - 'go.mod'
              - '*.go'
              - 'internal/**'
              - 'examples/go/**'

      - name: Setup Go
        if: steps.changes.outputs.go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Format check
        if: steps.changes.outputs.go == 'true'
        run: |
          test -z "$(gofmt -l . examples/go/)" || {
            echo "Go files not formatted. Run: gofmt -w . examples/go/"
            gofmt -l . examples/go/
            exit 1
          }

      - name: Vet
        if: steps.changes.outputs.go == 'true'
        run: go vet ./...

      - name: Test
        if: steps.changes.outputs.go == 'true'
        run: go test ./...

      - name: Build examples
        if: steps.changes.outputs.go == 'true'
        run: |
          for dir in examples/go/*/; do
            echo "Building $dir..."
            (cd "$dir" && go build -o /dev/null .)
          done

  bun:
    name: Bun
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SDK build
        run: bun run --filter 'tako.sh' build

      - name: Typecheck
        run: bun run --filter 'tako.sh' typecheck

      - name: Test
        run: bun test --cwd sdk/javascript

  cli-linux:
    name: CLI Tests (Linux)
    needs: [build-x86_64-glibc]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin

      - name: Make binaries executable
        run: chmod +x .e2e-bin/tako .e2e-bin/tako-dev-server .e2e-bin/tako-dev-proxy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --filter 'tako.sh' build

      - name: Add E2E bin to PATH
        run: echo "${{ github.workspace }}/.e2e-bin" >> $GITHUB_PATH

      - name: Run CLI tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
        run: cd e2e/cli && bun test

      - name: Run dev E2E tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
          TAKO_DEV_E2E: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd e2e/cli && sudo -E env "PATH=$PATH" bun test tests/dev.test.ts

  cli-macos:
    name: CLI Tests (macOS)
    needs: [build-darwin]
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-darwin-aarch64
          path: .e2e-bin

      - name: Make binaries executable
        run: chmod +x .e2e-bin/tako .e2e-bin/tako-dev-server .e2e-bin/tako-dev-proxy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --filter 'tako.sh' build

      - name: Add E2E bin to PATH
        run: echo "${{ github.workspace }}/.e2e-bin" >> $GITHUB_PATH

      - name: Run CLI tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
        run: cd e2e/cli && bun test

      - name: Run dev E2E tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
          TAKO_DEV_E2E: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd e2e/cli && sudo -E env "PATH=$PATH" bun test tests/dev.test.ts

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check website changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            website:
              - 'website/**'

      # Astro requires Node >= 22.12.0; runner default is too old
      - name: Setup Node
        if: steps.changes.outputs.website == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        if: steps.changes.outputs.website == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        if: steps.changes.outputs.website == 'true'
        run: bun install --frozen-lockfile

      - name: Install D2
        if: steps.changes.outputs.website == 'true'
        env:
          D2_VERSION: v0.7.1
        run: |
          curl -fsSLO "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz"
          tar -xzf "d2-${D2_VERSION}-linux-amd64.tar.gz"
          sudo make -sC "d2-${D2_VERSION}" install

      - name: Typecheck website
        if: steps.changes.outputs.website == 'true'
        run: bun run --filter website check

      - name: Build website
        if: steps.changes.outputs.website == 'true'
        run: bun run --filter website build --silent

      - name: Check links
        if: steps.changes.outputs.website == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--root-dir website/dist --exclude 'demo\\.tako\\.sh' --exclude 'dub\\.sh' --exclude 'pkg\\.go\\.dev' --exclude 'tako\\.sh/blog' --exclude 'tako\\.sh/docs' website/dist/**/*.html"

  # x86_64 glibc — needed for CLI tests + E2E
  build-x86_64-glibc:
    name: Build x86_64 (glibc)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    # Build inside Debian 11 container for glibc 2.31 compat (supports Debian 11+, Ubuntu 22.04+, RHEL 9+, Amazon Linux 2023)
    container: rust:1.89-bullseye
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-dev-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-x86_64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-dev-proxy
          if-no-files-found: error

  # x86_64 musl — needed for E2E (Alpine)
  build-x86_64-musl:
    name: Build x86_64 (musl)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: cargo build -p tako-server --release --target x86_64-unknown-linux-musl

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/tako-server
          if-no-files-found: error

  # aarch64 glibc — master only (for rolling release)
  build-aarch64-glibc:
    name: Build aarch64 (glibc)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && github.event_name == 'push'
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    # Build inside Debian 11 container for glibc 2.31 compat (same as x86_64)
    container: rust:1.89-bullseye
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-dev-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-aarch64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-aarch64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-dev-proxy
          if-no-files-found: error

  # aarch64 musl — master only (for rolling release)
  build-aarch64-musl:
    name: Build aarch64 (musl)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && github.event_name == 'push'
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: cargo build -p tako-server --release --target aarch64-unknown-linux-musl

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/tako-server
          if-no-files-found: error

  # macOS builds — master only (for rolling release)
  build-darwin:
    name: Build macOS CLI
    needs: [detect-changes]
    if: needs.detect-changes.outputs.website_only != 'true' && github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          TAKO_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-dev-proxy --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-dev-proxy --release --target x86_64-apple-darwin

      - name: Upload aarch64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-aarch64
          path: |
            target/aarch64-apple-darwin/release/tako
            target/aarch64-apple-darwin/release/tako-dev-server
            target/aarch64-apple-darwin/release/tako-dev-proxy
          if-no-files-found: error

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-x86_64
          path: |
            target/x86_64-apple-darwin/release/tako
            target/x86_64-apple-darwin/release/tako-dev-server
            target/x86_64-apple-darwin/release/tako-dev-proxy
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [build-x86_64-glibc, build-x86_64-musl]
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI + server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin/glibc

      - name: Download server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: .e2e-bin/glibc

      - name: Download server (musl)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: .e2e-bin/musl

      - name: Make binaries executable
        run: chmod +x .e2e-bin/glibc/* .e2e-bin/musl/*

      - name: Write E2E build stamp
        run: |
          set -euo pipefail
          arch=$(uname -m)
          head=$(git rev-parse HEAD)
          dirty_suffix=""
          if ! git diff --quiet --ignore-submodules HEAD --; then
            dirty_suffix="-dirty"
          fi
          printf '%s-%s%s\n' "$head" "$arch" "$dirty_suffix" > .e2e-bin/.build-stamp

      - name: Run E2E suites
        env:
          E2E_BIN_DIR: ${{ github.workspace }}/.e2e-bin
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for fixture in $(find e2e/fixtures -mindepth 2 -maxdepth 2 -type d | sort); do
            ./e2e/run.sh "$fixture"
          done
