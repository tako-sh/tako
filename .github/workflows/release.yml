name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  sign-darwin:
    name: Sign macOS app
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Find CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            run_id=$(gh run list --workflow=ci.yml --commit="$GITHUB_SHA" --status=success --json databaseId -q '.[0].databaseId')
            if [ -z "$run_id" ]; then
              echo "::error::No successful CI run found for commit $GITHUB_SHA"
              exit 1
            fi
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if builds ran
        id: builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ steps.ci-run.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "Build x86_64 (glibc)") | .conclusion')
          if [ "$conclusion" = "skipped" ] || [ -z "$conclusion" ]; then
            echo "Build jobs were skipped — skipping macOS signing"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS artifacts from CI
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ github.token }}
          pattern: bin-tako-darwin-*
          path: raw

      - name: Import macOS signing certificate
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.TAKO_CODESIGN_CERTIFICATE_BASE64 }}
          TAKO_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.TAKO_CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAKO_CODESIGN_CERTIFICATE_BASE64}" ]; then
            echo "::error::Missing secret TAKO_CODESIGN_CERTIFICATE_BASE64"
            exit 1
          fi
          keychain_password="$(openssl rand -hex 24)"
          keychain="$RUNNER_TEMP/tako-signing.keychain-db"
          cert="$RUNNER_TEMP/tako-signing.p12"
          if printf '%s' "$TAKO_CODESIGN_CERTIFICATE_BASE64" | base64 --decode > "$cert" 2>/dev/null; then
            :
          else
            printf '%s' "$TAKO_CODESIGN_CERTIFICATE_BASE64" | base64 -D > "$cert"
          fi
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert" -k "$keychain" -P "$TAKO_CODESIGN_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"

      - name: Sign macOS apps
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_CODESIGN_IDENTITY: ${{ secrets.TAKO_CODESIGN_IDENTITY }}
          TAKO_APPLE_TEAM_ID: ${{ secrets.TAKO_APPLE_TEAM_ID }}
          TAKO_KEYCHAIN_ACCESS_GROUP: ${{ secrets.TAKO_KEYCHAIN_ACCESS_GROUP }}
          TAKO_PROVISION_PROFILE_BASE64: ${{ secrets.TAKO_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          for var in TAKO_CODESIGN_IDENTITY TAKO_APPLE_TEAM_ID TAKO_KEYCHAIN_ACCESS_GROUP TAKO_PROVISION_PROFILE_BASE64; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing secret $var"
              exit 1
            fi
          done
          sh scripts/package-tako-app.sh \
            raw/bin-tako-darwin-aarch64/tako \
            raw/bin-tako-darwin-aarch64/Tako.app
          sh scripts/package-tako-app.sh \
            raw/bin-tako-darwin-x86_64/tako \
            raw/bin-tako-darwin-x86_64/Tako.app
          codesign --verify --verbose=4 raw/bin-tako-darwin-aarch64/Tako.app
          codesign --verify --verbose=4 raw/bin-tako-darwin-x86_64/Tako.app

      - name: Upload signed aarch64
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signed-bin-tako-darwin-aarch64
          path: |
            raw/bin-tako-darwin-aarch64/tako-dev-server
            raw/bin-tako-darwin-aarch64/tako-dev-proxy
            raw/bin-tako-darwin-aarch64/Tako.app
          if-no-files-found: error

      - name: Upload signed x86_64
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signed-bin-tako-darwin-x86_64
          path: |
            raw/bin-tako-darwin-x86_64/tako-dev-server
            raw/bin-tako-darwin-x86_64/tako-dev-proxy
            raw/bin-tako-darwin-x86_64/Tako.app
          if-no-files-found: error

  publish-binaries:
    name: Publish binaries
    needs: [sign-darwin]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout (for tag update)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Find CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            run_id=$(gh run list --workflow=ci.yml --commit="$GITHUB_SHA" --status=success --json databaseId -q '.[0].databaseId')
            if [ -z "$run_id" ]; then
              echo "::error::No successful CI run found for commit $GITHUB_SHA"
              exit 1
            fi
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if builds ran
        id: builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ steps.ci-run.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "Build x86_64 (glibc)") | .conclusion')
          if [ "$conclusion" = "skipped" ] || [ -z "$conclusion" ]; then
            echo "Build jobs were skipped — skipping release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts from CI
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ github.token }}
          pattern: bin-*
          path: raw

      - name: Download signed macOS artifacts
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: signed-bin-tako-darwin-*
          path: signed-raw

      - name: Package, sign, and publish
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_SERVER_RELEASE_SIGNING_KEY_PEM: ${{ secrets.TAKO_SERVER_RELEASE_SIGNING_KEY_PEM }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p dist

          package_server() {
            local arch=$1 libc=$2
            local src="raw/bin-tako-server-linux-${arch}-${libc}/tako-server"
            local name="tako-server-linux-${arch}-${libc}.tar.zst"
            local out="dist/${name}"
            tmpdir="$(mktemp -d)"
            cp "$src" "$tmpdir/tako-server"
            tar -cf - -C "$tmpdir" tako-server | zstd -19 -o "$out"
            (cd dist && sha256sum "$name") > "${out}.sha256"
            rm -rf "$tmpdir"
          }

          package_cli_linux() {
            local arch=$1
            local src="raw/bin-tako-linux-${arch}"
            local name="tako-linux-${arch}.tar.gz"
            local out="dist/${name}"
            tmpdir="$(mktemp -d)"
            cp "$src/tako" "$src/tako-dev-server" "$src/tako-dev-proxy" "$tmpdir/"
            tar -czf "$out" -C "$tmpdir" tako tako-dev-server tako-dev-proxy
            (cd dist && sha256sum "$name") > "${out}.sha256"
            rm -rf "$tmpdir"
          }

          package_cli_darwin() {
            local arch=$1
            local src="signed-raw/signed-bin-tako-darwin-${arch}"
            local name="tako-darwin-${arch}.tar.gz"
            local out="dist/${name}"
            tmpdir="$(mktemp -d)"
            cp "$src/tako-dev-server" "$src/tako-dev-proxy" "$tmpdir/"
            cp -R "$src/Tako.app" "$tmpdir/"
            chmod 0755 "$tmpdir/Tako.app/Contents/MacOS/tako"
            tar -czf "$out" -C "$tmpdir" tako-dev-server tako-dev-proxy Tako.app
            (cd dist && sha256sum "$name") > "${out}.sha256"
            rm -rf "$tmpdir"
          }

          package_server x86_64 glibc
          package_server x86_64 musl
          package_server aarch64 glibc
          package_server aarch64 musl
          package_cli_linux x86_64
          package_cli_linux aarch64
          package_cli_darwin aarch64
          package_cli_darwin x86_64

          ls -la dist/

          # Sign server checksums
          if [ -z "${TAKO_SERVER_RELEASE_SIGNING_KEY_PEM}" ]; then
            echo "::error::Missing secret TAKO_SERVER_RELEASE_SIGNING_KEY_PEM"
            exit 1
          fi
          find dist -maxdepth 1 -name 'tako-server-linux-*.tar.zst.sha256' -print | sort | xargs cat > dist/tako-server-sha256s.txt
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "${TAKO_SERVER_RELEASE_SIGNING_KEY_PEM}" > "$key_file"
          openssl dgst -sha256 -sign "$key_file" -out dist/tako-server-sha256s.txt.sig dist/tako-server-sha256s.txt

          # Tag and publish
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest

          assets=(dist/*)
          for f in "${assets[@]}"; do test -f "$f"; done

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          title="Latest"
          notes="Latest build from master (${short_sha}) on ${timestamp}."

          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest \
              --target master \
              --title "$title" \
              --notes "$notes"
          fi

          gh release edit latest --title "$title" --notes "$notes" --prerelease=false --draft=false
          gh release upload latest --clobber "${assets[@]}"
          # Bump published_at so the GitHub sidebar shows the rolling release as recent.
          # GitHub ignores published_at on a plain PATCH; toggling draft on→off re-stamps it.
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/latest" --jq .id)"
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" -F draft=true >/dev/null
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false -f published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" >/dev/null

  publish-sdk:
    name: Publish SDK
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 100

      - name: Check for SDK changes
        id: changes
        run: |
          if git fetch origin tag sdk-js-latest --no-tags 2>/dev/null; then
            if ! git diff --name-only sdk-js-latest -- sdk/javascript/ | grep -q .; then
              echo "No SDK changes since sdk-js-latest, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Bun
        if: steps.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Publish
        if: steps.changes.outputs.skip != 'true'
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          short_sha="$(printf '%s' "$sha" | cut -c1-7)"
          version="0.0.0-${short_sha}"
          echo "Publishing sdk: $version"
          cd sdk/javascript
          npm pkg set version="$version"
          bun install
          bun run build
          npm publish --tag latest --provenance --access public

      - name: Update sdk-js-latest tag
        if: steps.changes.outputs.skip != 'true'
        run: |
          git tag -f sdk-js-latest
          git push -f origin sdk-js-latest
