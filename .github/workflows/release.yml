name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  sign-darwin:
    name: Sign macOS app
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-15
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Find CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            run_id=$(gh run list --workflow=ci.yml --commit="$GITHUB_SHA" --status=success --json databaseId -q '.[0].databaseId')
            if [ -z "$run_id" ]; then
              echo "::error::No successful CI run found for commit $GITHUB_SHA"
              exit 1
            fi
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if builds ran
        id: builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ steps.ci-run.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "Build x86_64 (glibc)") | .conclusion')
          if [ "$conclusion" = "skipped" ] || [ -z "$conclusion" ]; then
            echo "Build jobs were skipped — skipping macOS signing"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS artifacts from CI
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ github.token }}
          name: bin-tako-darwin-aarch64
          path: raw/bin-tako-darwin-aarch64

      - name: Import macOS signing certificate
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.TAKO_CODESIGN_CERTIFICATE_BASE64 }}
          TAKO_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.TAKO_CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAKO_CODESIGN_CERTIFICATE_BASE64}" ]; then
            echo "::error::Missing secret TAKO_CODESIGN_CERTIFICATE_BASE64"
            exit 1
          fi
          keychain_password="$(openssl rand -hex 24)"
          keychain="$RUNNER_TEMP/tako-signing.keychain-db"
          cert="$RUNNER_TEMP/tako-signing.p12"
          if printf '%s' "$TAKO_CODESIGN_CERTIFICATE_BASE64" | base64 --decode > "$cert" 2>/dev/null; then
            :
          else
            printf '%s' "$TAKO_CODESIGN_CERTIFICATE_BASE64" | base64 -D > "$cert"
          fi
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          if ! security import "$cert" -k "$keychain" -P "$TAKO_CODESIGN_CERTIFICATE_PASSWORD" -T /usr/bin/codesign; then
            if [ -n "$TAKO_CODESIGN_CERTIFICATE_PASSWORD" ]; then
              echo "Certificate import failed with TAKO_CODESIGN_CERTIFICATE_PASSWORD; retrying with an empty password"
              security import "$cert" -k "$keychain" -P "" -T /usr/bin/codesign
            else
              exit 1
            fi
          fi
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          echo "TAKO_CODESIGN_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning "$keychain"

      - name: Sign and package macOS artifacts
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_CODESIGN_IDENTITY: ${{ secrets.TAKO_CODESIGN_IDENTITY }}
          TAKO_APPLE_TEAM_ID: ${{ secrets.TAKO_APPLE_TEAM_ID }}
          TAKO_KEYCHAIN_ACCESS_GROUP: ${{ secrets.TAKO_KEYCHAIN_ACCESS_GROUP }}
          TAKO_PROVISION_PROFILE_BASE64: ${{ secrets.TAKO_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          for var in TAKO_CODESIGN_IDENTITY TAKO_APPLE_TEAM_ID TAKO_KEYCHAIN_ACCESS_GROUP TAKO_PROVISION_PROFILE_BASE64; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing secret $var"
              exit 1
            fi
          done

          codesign_binary() {
            if [ -n "${TAKO_CODESIGN_KEYCHAIN:-}" ]; then
              if [ -n "${TAKO_CODESIGN_PAGESIZE:-}" ]; then
                codesign --force --pagesize "$TAKO_CODESIGN_PAGESIZE" --sign "$TAKO_CODESIGN_IDENTITY" --keychain "$TAKO_CODESIGN_KEYCHAIN" "$@"
              else
                codesign --force --sign "$TAKO_CODESIGN_IDENTITY" --keychain "$TAKO_CODESIGN_KEYCHAIN" "$@"
              fi
            else
              if [ -n "${TAKO_CODESIGN_PAGESIZE:-}" ]; then
                codesign --force --pagesize "$TAKO_CODESIGN_PAGESIZE" --sign "$TAKO_CODESIGN_IDENTITY" "$@"
              else
                codesign --force --sign "$TAKO_CODESIGN_IDENTITY" "$@"
              fi
            fi
          }

          verify_archive() {
            local archive=$1
            local tmp
            tmp="$(mktemp -d)"
            tar -xzf "$archive" -C "$tmp"
            codesign --verify --strict --deep --verbose=4 "$tmp/Tako.app"
            codesign --verify --strict --verbose=4 "$tmp/Tako.app/Contents/MacOS/tako"
            codesign --verify --strict --verbose=4 "$tmp/tako-dev-server"
            codesign --verify --strict --verbose=4 "$tmp/tako-dev-proxy"
            rm -rf "$tmp"
          }

          package_arch() {
            local arch=$1
            local src="raw/bin-tako-darwin-${arch}"
            local name="tako-darwin-${arch}.tar.gz"
            local out="signed-dist/${name}"
            local pagesize=""
            local tmp
            if [ "$arch" = "aarch64" ]; then
              pagesize=16384
            fi
            TAKO_CODESIGN_PAGESIZE="$pagesize" sh scripts/package-tako-app.sh "$src/tako" "$src/Tako.app"
            TAKO_CODESIGN_PAGESIZE="$pagesize" codesign_binary "$src/tako-dev-server"
            TAKO_CODESIGN_PAGESIZE="$pagesize" codesign_binary "$src/tako-dev-proxy"
            codesign --verify --strict --deep --verbose=4 "$src/Tako.app"
            codesign --verify --strict --verbose=4 "$src/Tako.app/Contents/MacOS/tako"
            codesign --verify --strict --verbose=4 "$src/tako-dev-server"
            codesign --verify --strict --verbose=4 "$src/tako-dev-proxy"

            mkdir -p signed-dist
            tmp="$(mktemp -d)"
            cp "$src/tako-dev-server" "$src/tako-dev-proxy" "$tmp/"
            ditto "$src/Tako.app" "$tmp/Tako.app"
            tar -czf "$out" -C "$tmp" tako-dev-server tako-dev-proxy Tako.app
            (cd signed-dist && shasum -a 256 "$name") > "${out}.sha256"
            verify_archive "$out"
            rm -rf "$tmp"
          }

          package_arch aarch64

      - name: Upload signed aarch64
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: signed-bin-tako-darwin-aarch64
          path: |
            signed-dist/tako-darwin-aarch64.tar.gz
            signed-dist/tako-darwin-aarch64.tar.gz.sha256
          if-no-files-found: error

  publish-binaries:
    name: Publish binaries
    needs: [sign-darwin]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout (for tag update)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Find CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            run_id=$(gh run list --workflow=ci.yml --commit="$GITHUB_SHA" --status=success --json databaseId -q '.[0].databaseId')
            if [ -z "$run_id" ]; then
              echo "::error::No successful CI run found for commit $GITHUB_SHA"
              exit 1
            fi
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if builds ran
        id: builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ steps.ci-run.outputs.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "Build x86_64 (glibc)") | .conclusion')
          if [ "$conclusion" = "skipped" ] || [ -z "$conclusion" ]; then
            echo "Build jobs were skipped — skipping release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts from CI
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ github.token }}
          pattern: bin-*
          path: raw

      - name: Download signed macOS artifacts
        if: steps.builds.outputs.skipped != 'true'
        uses: actions/download-artifact@v8
        with:
          name: signed-bin-tako-darwin-aarch64
          path: signed-raw/signed-bin-tako-darwin-aarch64

      - name: Package, sign, and publish
        if: steps.builds.outputs.skipped != 'true'
        env:
          TAKO_SERVER_RELEASE_SIGNING_KEY_PEM: ${{ secrets.TAKO_SERVER_RELEASE_SIGNING_KEY_PEM }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p dist

          package_server() {
            local arch=$1 libc=$2
            local src="raw/bin-tako-server-linux-${arch}-${libc}/tako-server"
            local name="tako-server-linux-${arch}-${libc}.tar.zst"
            local out="dist/${name}"
            tmpdir="$(mktemp -d)"
            cp "$src" "$tmpdir/tako-server"
            tar -cf - -C "$tmpdir" tako-server | zstd -19 -o "$out"
            (cd dist && sha256sum "$name") > "${out}.sha256"
            rm -rf "$tmpdir"
          }

          package_cli_linux() {
            local arch=$1
            local src="raw/bin-tako-linux-${arch}"
            local name="tako-linux-${arch}.tar.gz"
            local out="dist/${name}"
            tmpdir="$(mktemp -d)"
            cp "$src/tako" "$src/tako-dev-server" "$src/tako-dev-proxy" "$tmpdir/"
            tar -czf "$out" -C "$tmpdir" tako tako-dev-server tako-dev-proxy
            (cd dist && sha256sum "$name") > "${out}.sha256"
            rm -rf "$tmpdir"
          }

          copy_cli_darwin() {
            local arch=$1
            local name="tako-darwin-${arch}.tar.gz"
            local src="signed-raw/signed-bin-tako-darwin-${arch}"
            cp "$src/$name" "dist/$name"
            cp "$src/$name.sha256" "dist/$name.sha256"
          }

          package_server x86_64 glibc
          package_server x86_64 musl
          package_server aarch64 glibc
          package_server aarch64 musl
          package_cli_linux x86_64
          package_cli_linux aarch64
          copy_cli_darwin aarch64

          ls -la dist/

          # Sign server checksums
          if [ -z "${TAKO_SERVER_RELEASE_SIGNING_KEY_PEM}" ]; then
            echo "::error::Missing secret TAKO_SERVER_RELEASE_SIGNING_KEY_PEM"
            exit 1
          fi
          find dist -maxdepth 1 -name 'tako-server-linux-*.tar.zst.sha256' -print | sort | xargs cat > dist/tako-server-sha256s.txt
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "${TAKO_SERVER_RELEASE_SIGNING_KEY_PEM}" > "$key_file"
          openssl dgst -sha256 -sign "$key_file" -out dist/tako-server-sha256s.txt.sig dist/tako-server-sha256s.txt

          # Tag and publish
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest

          assets=(dist/*)
          for f in "${assets[@]}"; do test -f "$f"; done

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          title="Latest"
          notes="Latest build from master (${short_sha}) on ${timestamp}."

          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest \
              --target master \
              --title "$title" \
              --notes "$notes"
          fi

          gh release edit latest --title "$title" --notes "$notes" --prerelease=false --draft=false
          gh release upload latest --clobber "${assets[@]}"
          # Bump published_at so the GitHub sidebar shows the rolling release as recent.
          # GitHub ignores published_at on a plain PATCH; toggling draft on→off re-stamps it.
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/latest" --jq .id)"
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" -F draft=true >/dev/null
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false -f published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" >/dev/null

  publish-sdk:
    name: Publish SDK
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 100

      - name: Check for SDK changes
        id: changes
        run: |
          if git fetch origin tag sdk-js-latest --no-tags 2>/dev/null; then
            if ! git diff --name-only sdk-js-latest -- sdk/javascript/ | grep -q .; then
              echo "No SDK changes since sdk-js-latest, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        if: steps.changes.outputs.skip != 'true'
        run: bash scripts/install-bun.sh 1.3.14

      - name: Publish
        if: steps.changes.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          short_sha="$(printf '%s' "$sha" | cut -c1-7)"
          version="0.0.0-${short_sha}"
          echo "Publishing sdk: $version"
          cd sdk/javascript
          npm pkg set version="$version"
          bun install
          bun run build
          npm publish --tag latest --provenance --access public || {
            echo "::error::npm publish failed. Configure npm trusted publishing for tako.sh or set NPM_TOKEN in the release environment."
            exit 1
          }

      - name: Update sdk-js-latest tag
        if: steps.changes.outputs.skip != 'true'
        run: |
          git tag -f sdk-js-latest
          git push -f origin sdk-js-latest

  publish-rust-sdk:
    name: Publish Rust SDK
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 100

      - name: Check Rust SDK version
        id: changes
        run: |
          if git fetch origin tag sdk-rust-latest --no-tags 2>/dev/null; then
            current_version="$(sed -n 's/^version = "\(.*\)"/\1/p' sdk/rust/Cargo.toml | head -n1)"
            previous_version="$(git show sdk-rust-latest:sdk/rust/Cargo.toml | sed -n 's/^version = "\(.*\)"/\1/p' | head -n1)"

            if [ "$current_version" = "$previous_version" ]; then
              echo "Rust SDK version unchanged ($current_version), skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            elif ! git diff --name-only sdk-rust-latest -- sdk/rust/ | grep -q .; then
              echo "No Rust SDK changes since sdk-rust-latest, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Rust SDK version changed: $previous_version -> $current_version"
            fi
          fi

      - name: Setup Rust
        if: steps.changes.outputs.skip != 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Publish
        if: steps.changes.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::error::Missing secret CARGO_REGISTRY_TOKEN in the release environment."
            exit 1
          fi

          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          short_sha="$(printf '%s' "$sha" | cut -c1-7)"
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' sdk/rust/Cargo.toml | head -n1)"
          echo "Publishing Rust SDK: $version (${short_sha})"

          cargo publish -p tako --dry-run
          cargo publish -p tako || {
            echo "::error::cargo publish failed. If this version already exists, run: just sdk-rust patch"
            exit 1
          }

      - name: Update sdk-rust-latest tag
        if: steps.changes.outputs.skip != 'true'
        run: |
          git tag -f sdk-rust-latest
          git push -f origin sdk-rust-latest
